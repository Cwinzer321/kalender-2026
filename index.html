<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalender Akademik 2026</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📅</text></svg>">
    <meta name="description" content="Kalender Akademik 2026 dengan perpaduan warna estetik Violet dan Cyan.">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-effects">
        <div class="blob violet"></div>
        <div class="blob cyan"></div>
    </div>
    
    <header class="header">
        <h1> Kalenderku <span>2026</span></h1>
        
        <!-- Untuk Memilih Bulan -->
        <div class="month-selector-container">
            <select id="month-selector" class="glass-select">
                <option value="all">Pilih Bulan</option>
                <option value="0">Januari</option>
                <option value="1">Februari</option>
                <option value="2">Maret</option>
                <option value="3">April</option>
                <option value="4">Mei</option>
                <option value="5">Juni</option>
                <option value="6">Juli</option>
                <option value="7">Agustus</option>
                <option value="8">September</option>
                <option value="9">Oktober</option>
                <option value="10">November</option>
                <option value="11">Desember</option>
            </select>
            <button id="open-event-manager-btn" class="glass-select" style="margin-left: 0.5rem; cursor: pointer; padding: 0.8rem 1rem;">⚙️ Atur Acara</button>
        </div>
        <!-- Akhir Untuk Memilih Bulan -->

    </header>

    
    <main class="calendar-grid" id="calendar-container">
        <!-- Months will be injected by JS -->
    </main>

    <!-- Modal Information -->
    <div class="modal-overlay" id="info-modal">
        <div class="modal-content">
            <button class="modal-close" id="modal-close">&times;</button>
            <div class="modal-header" id="modal-date"></div>
            <div class="modal-body" id="modal-info"></div>
            <div class="modal-agenda">
                <textarea id="agenda-input" placeholder="Ketik agenda / catatan Anda di sini..."></textarea>
                <button id="save-agenda-btn">Simpan Agenda</button>
            </div>
        </div>
    </div>

    <!-- Event Manager Modal -->
    <div class="modal-overlay" id="event-manager-modal">
        <div class="modal-content" style="max-width: 500px; padding: 2rem;">
            <button class="modal-close" id="event-manager-close">&times;</button>
            <div class="modal-header" style="text-align: left; font-size: 1.3rem; margin-bottom: 0.5rem; color: var(--text-primary); font-weight: 600;">Atur Rentang Acara</div>
            <p style="text-align: left; color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 1.5rem;">Tambahkan atau hapus rentang acara dengan indikator garis.</p>
            
            <div class="event-manager-body">
                <div class="event-add-form">
                    <input type="date" id="event-start" class="range-input" required title="Tanggal Mulai">
                    <input type="date" id="event-end" class="range-input" required title="Tanggal Selesai">
                    <input type="text" id="event-name" class="range-input" placeholder="Nama Acara" required>
                    <select id="event-color" class="range-input">
                        <option value="violet">Garis Violet</option>
                        <option value="cyan">Garis Cyan</option>
                    </select>
                    <button id="add-event-btn" class="glass-btn primary">Tambah Acara</button>
                </div>
                
                <h4 style="margin-top: 1.5rem; margin-bottom: 0.5rem; text-align: left; color: var(--text-secondary); font-size: 0.9rem;">Acara Tersimpan:</h4>
                <div id="event-list-container" class="event-list">
                    <!-- Events injected here -->
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
